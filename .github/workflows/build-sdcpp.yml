name: Build sd.cpp (Windows CUDA)

# Build MAISON de stable-diffusion.cpp, ALIGNÉ sur la config de compilation
# OFFICIELLE de sd.cpp pour la FIABILITÉ : générateur Ninja, GGML_NATIVE=OFF +
# GGML_CPU_ALL_VARIANTS=ON (variantes CPU + dispatch au RUNTIME → portable sur
# n'importe quel CPU ; sans ça, GGML_NATIVE=ON compilait pour le CPU du runner
# et crashait sur d'autres machines), backends en DLL, /bigobj. Les archis CUDA
# restent taillées pour les cartes du projet (1080 Ti=61, 2080 Ti=75, 3060=86).
# Déclenché À LA MAIN (Actions → « Run workflow »). Le binaire + les DLL sont
# publiés dans une release au tag mouvant « engine-latest », téléchargée par
# `update-engine-ci.bat` (→ get_sdcpp.py --source ours).

on:
  workflow_dispatch:
    inputs:
      sd_ref:
        description: "Version de stable-diffusion.cpp (branche / tag / commit)"
        default: "master"
      sd_pr:
        description: "PR sd.cpp à tirer avant build (numéros séparés par espace, ex. '1621 1811'). Vide = aucune."
        default: ""
      cuda_arch:
        description: "Architectures CUDA (1080 Ti=61, 2080 Ti=75, 3060=86)"
        default: "61;75;86"
      cuda_version:
        description: "Version du CUDA Toolkit"
        default: "12.4.1"
      release_tag:
        description: "Tag de release à (re)publier"
        default: "engine-latest"

permissions:
  contents: write   # publier la release + son archive

jobs:
  build:
    # IMPORTANT : runner ÉPINGLÉ à windows-2022 (Visual Studio 2022). Le runner
    # « windows-latest » est passé à Visual Studio 18/2026, pour lequel le CUDA
    # Toolkit 12.x n'a PAS d'intégration MSBuild → « No CUDA toolset found ».
    # VS2022 est la dernière version supportée par nvcc 12.x.
    runs-on: windows-2022
    steps:
      # Environnement MSVC (cl.exe) exporté aux étapes suivantes : requis pour
      # le générateur Ninja (nvcc utilise cl.exe comme host compiler), comme la
      # CI officielle sd.cpp.
      - name: Configurer l'environnement MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Installer Ninja
        shell: pwsh
        run: choco install ninja -y --no-progress

      # CUDA Toolkit complet (fiabilité > vitesse : ~20-25 min de build au total).
      - name: Installer le CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.19
        id: cuda
        with:
          cuda: ${{ inputs.cuda_version }}
          method: network

      - name: Cloner stable-diffusion.cpp (${{ inputs.sd_ref }})
        shell: pwsh
        run: |
          git clone --recursive https://github.com/leejet/stable-diffusion.cpp sdcpp
          cd sdcpp
          git checkout "${{ inputs.sd_ref }}"
          git submodule update --init --recursive
          Write-Host "Commit builé :"
          git rev-parse HEAD

      # Tire une ou plusieurs PR non mergées AVANT de compiler (le build maison
      # sert exactement à ça). Chaque PR est fetch puis mergée sur la ref ; si
      # un merge échoue (conflit) ou casse la compilation, le run échoue —
      # aucun dégât, on retire la PR et on relance.
      - name: Tirer les PR sd.cpp (optionnel)
        if: ${{ inputs.sd_pr != '' }}
        shell: pwsh
        working-directory: sdcpp
        run: |
          git config user.email "ci@local"
          git config user.name "ci-build"
          foreach ($pr in "${{ inputs.sd_pr }}".Split(" ")) {
            $pr = $pr.Trim()
            if ($pr -eq "") { continue }
            Write-Host "== Tirage de la PR #$pr =="
            git fetch origin "pull/$pr/head:pr-$pr"
            if ($LASTEXITCODE -ne 0) { throw "Fetch de la PR #$pr echoue." }
            git merge --no-edit "pr-$pr"
            # PowerShell ne s'arrete PAS sur le code retour non-zero de git : on
            # verifie $LASTEXITCODE explicitement, sinon un merge en CONFLIT
            # laisserait des marqueurs <<<<<<< dans le code et casserait la
            # compilation 40 min plus tard (erreur trompeuse). On echoue net.
            if ($LASTEXITCODE -ne 0) {
              git merge --abort
              throw "PR #$pr : conflit de merge avec la base. Elle doit etre rebasee sur master pour s'appliquer. Retire-la du champ sd_pr (ou choisis un sd_ref proche de sa base)."
            }
          }
          git submodule update --init --recursive

      # Capture la vraie date de build + le commit sd.cpp exact (après merge des
      # PR) : la release utilise un tag MOUVANT, donc sa date affichée reste
      # figée à la 1re création — on met la vraie info dans le nom/corps.
      - name: Métadonnées du build
        id: meta
        shell: pwsh
        working-directory: sdcpp
        run: |
          $sha = (git rev-parse --short HEAD).Trim()
          $desc = (git describe --tags --always 2>$null)
          if (-not $desc) { $desc = $sha } else { $desc = $desc.Trim() }
          $date = [DateTime]::UtcNow.ToString("yyyy-MM-dd HH:mm 'UTC'")
          "sha=$sha"       | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "describe=$desc" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "date=$date"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "build $date · commit $sha ($desc)"

      # Config ALIGNÉE sur la CI officielle sd.cpp (fiabilité) : Ninja + cl.exe,
      # GGML_NATIVE=OFF + GGML_CPU_ALL_VARIANTS=ON (portabilité CPU), backends en
      # DLL, /bigobj. Seule différence assumée : archis CUDA ciblées (nos cartes)
      # au lieu de la liste générique — c'est l'optimisation « pour ta machine ».
      - name: Configurer (CMake · Ninja · CUDA · arch ${{ inputs.cuda_arch }})
        shell: pwsh
        run: |
          cmake -S sdcpp -B sdcpp/build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl `
            -DCMAKE_CXX_FLAGS=/bigobj `
            -DSD_CUDA=ON `
            -DSD_BUILD_SHARED_LIBS=ON `
            -DSD_BUILD_SHARED_GGML_LIB=ON `
            -DGGML_BACKEND_DL=ON `
            -DGGML_CPU_ALL_VARIANTS=ON `
            -DGGML_NATIVE=OFF `
            -DCMAKE_CUDA_ARCHITECTURES="${{ inputs.cuda_arch }}" `
            -DSD_WEBP=OFF -DSD_WEBM=OFF

      - name: Compiler
        shell: pwsh
        run: cmake --build sdcpp/build --parallel

      - name: Empaqueter (binaire + DLL CUDA)
        shell: pwsh
        run: |
          $out = "package"
          New-Item -ItemType Directory -Force -Path $out | Out-Null

          # Localiser le binaire CLI (sd.exe / sd-cli.exe), où qu'il soit.
          $exe = Get-ChildItem -Path sdcpp/build -Recurse -File -Include sd.exe,sd-cli.exe |
                 Select-Object -First 1
          if (-not $exe) {
            $exe = Get-ChildItem -Path sdcpp/build -Recurse -File -Include *.exe |
                   Where-Object { $_.Name -notmatch 'test|example|quantize' } |
                   Select-Object -First 1
          }
          if (-not $exe) { throw "Aucun binaire sd trouvé dans le build." }
          Write-Host "Binaire : $($exe.FullName)"
          Copy-Item $exe.FullName "$out/sd.exe" -Force

          # DLL à côté du binaire (ggml-base, ggml-cpu-*, ggml-cuda,
          # stable-diffusion… — backends chargés au runtime via GGML_BACKEND_DL).
          Get-ChildItem "$($exe.Directory.FullName)/*.dll" -ErrorAction SilentlyContinue |
            Copy-Item -Destination $out -Force
          # Filet : toutes les DLL ggml/sd du build, où qu'elles soient (les
          # variantes CPU GGML_CPU_ALL_VARIANTS sont indispensables au dispatch).
          Get-ChildItem -Path sdcpp/build -Recurse -File -Include ggml*.dll,stable-diffusion*.dll -ErrorAction SilentlyContinue |
            ForEach-Object { if (-not (Test-Path "$out/$($_.Name)")) { Copy-Item $_.FullName $out -Force } }

          # Runtime CUDA (indispensable sans CUDA Toolkit installé côté client).
          $cudabin = Join-Path $env:CUDA_PATH "bin"
          foreach ($d in @("cudart64_12.dll","cublas64_12.dll","cublasLt64_12.dll")) {
            $p = Join-Path $cudabin $d
            if (Test-Path $p) { Copy-Item $p $out -Force }
            else { Write-Host "⚠️ DLL manquante : $d" }
          }

          Get-ChildItem $out | Format-Table Name,Length -AutoSize
          Compress-Archive -Path "$out/*" -DestinationPath "sd-cuda-windows-x64.zip" -Force
          Write-Host "Archive prête : sd-cuda-windows-x64.zip"

      - name: Publier la release « ${{ inputs.release_tag }} »
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: "Moteur sd.cpp — build ${{ steps.meta.outputs.date }} · commit ${{ steps.meta.outputs.sha }} (arch ${{ inputs.cuda_arch }})"
          body: |
            Build **maison** de stable-diffusion.cpp pour Turbo Slop Generator 3000,
            optimisé pour les cartes du projet.

            > ⚠️ Le tag `engine-latest` est **mouvant** : la date affichée par
            > GitHub reste celle de la 1re release. La **vraie** date/version du
            > binaire est ci-dessous (et le `.zip` est ré-uploadé à chaque build).

            - **Build : `${{ steps.meta.outputs.date }}`**
            - **Commit sd.cpp : `${{ steps.meta.outputs.describe }}` (`${{ steps.meta.outputs.sha }}`)**
            - Source : `${{ inputs.sd_ref }}`
            - PR appliquées : `${{ inputs.sd_pr }}`
            - CUDA : `${{ inputs.cuda_version }}` · architectures : `${{ inputs.cuda_arch }}`
            - Archive : `sd-cuda-windows-x64.zip` (binaire `sd.exe` + DLL runtime CUDA)

            Installé côté app par **`update-engine-ci.bat`**
            (`scripts/get_sdcpp.py --source ours`).
          files: sd-cuda-windows-x64.zip
