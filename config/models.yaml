# ============================================================================
#  GEN.Ai Image Workshop — Bibliothèque de modèles
# ----------------------------------------------------------------------------
#  Source unique de vérité : téléchargement à la demande, recommandations selon
#  le matériel, et réglages automatiques par modèle (steps/cfg/sampler/...).
#
#  Jokers dans `match` :
#    {quant}     -> quantification du modèle de diffusion (selon VRAM)
#    {enc_quant} -> quantification de l'encodeur de texte (selon RAM, en offload)
#  Le téléchargeur interroge l'API Hugging Face et choisit le meilleur fichier.
# ============================================================================

base_models:

  # --------------------------------------------------------------------------
  - id: flux2-klein-9b
    name: "Flux.2 Klein 9B"
    family: flux2
    tags: [qualité, rapide, distillé, édition]
    description: >
      FLUX.2 Klein 9B en GGUF (distillé, rapide : 4 pas, CFG 1.0). Diffusion Q4
      ≈ 5 Go en VRAM ; encodeur Qwen3-8B **abliteré (non censuré)** déchargé en
      RAM ; VAE flux2. Tourne dès 10–12 Go. Modèle d'ÉDITION : fournissez une
      image de référence et décrivez la modification dans le prompt.
    sources:
      diffusion:
        repo: leejet/FLUX.2-klein-9B-GGUF
        match: "*klein-9b*{quant}.gguf"
        quantizable: true
      vae:
        repo: Comfy-Org/flux2-klein-9B
        match: "split_files/vae/flux2-vae.safetensors"
      text_encoder:
        repo: bartowski/mlabonne_Qwen3-8B-abliterated-GGUF
        match: "mlabonne_Qwen3-8B-abliterated-{enc_quant}.gguf"
        quantizable: true
    defaults:
      steps: 4
      cfg_scale: 1.0
      sampler: euler
      scheduler: auto     # doc sd.cpp : scheduler non forcé (défaut moteur)
      width: 1024
      height: 1024
      supports_negative: false
    presets:
      # Aligné sur docs/flux2.md : euler, cfg 1.0, 4 pas, scheduler = défaut moteur
      # (la doc ne force jamais de scheduler). Variantes = plus de pas seulement.
      - {name: "⚡ Recommandé (doc, 4 pas)", sampler: euler, scheduler: auto, steps: 4, cfg_scale: 1.0}
      - {name: "Équilibré (6 pas)",          sampler: euler, scheduler: auto, steps: 6, cfg_scale: 1.0}
      - {name: "Qualité (8 pas)",            sampler: euler, scheduler: auto, steps: 8, cfg_scale: 1.0}
    vram_min_gb: 10

  # --------------------------------------------------------------------------
  - id: krea2-turbo
    name: "Krea 2 Turbo"
    family: krea2
    tags: [rapide, distillé, krea]
    description: >
      Krea 2 « Turbo » (distillé) en GGUF — variante rapide (8 pas, CFG 1.0) du
      modèle Krea 2. Encodeur Qwen3-VL-4B **abliteré (non censuré)** (via --llm,
      déchargé en RAM) + VAE WAN 2.1. Photoréalisme, idéal sur 11–12 Go en Q4_K_M.
    sources:
      diffusion:
        repo: realrebelai/KREA-2_GGUFs
        match: "TURBO/Krea-2-Turbo-{quant}.gguf"
        quantizable: true
      text_encoder:
        repo: noctrex/Huihui-Qwen3-VL-4B-Instruct-abliterated-GGUF
        match: "Huihui-Qwen3-VL-4B-Instruct-abliterated-{enc_quant}.gguf"
        quantizable: true
      vae:
        repo: Comfy-Org/Wan_2.1_ComfyUI_repackaged
        match: "*wan_2.1_vae.safetensors"
    defaults:
      steps: 8
      cfg_scale: 1.0
      sampler: euler
      scheduler: auto     # doc sd.cpp : scheduler non forcé (défaut moteur)
      width: 1024
      height: 1024
      supports_negative: false
    presets:
      # Aligné sur docs/krea2.md : euler + scheduler = défaut moteur, cfg 1.0.
      # La doc ne fixe pas de pas ; on garde le 8 pas « officiel » du Turbo distillé.
      - {name: "⚡ Officiel (8 pas)",   sampler: euler, scheduler: auto, steps: 8,  cfg_scale: 1.0}
      - {name: "Très rapide (4 pas)",  sampler: euler, scheduler: auto, steps: 4,  cfg_scale: 1.0}
      - {name: "Qualité (12 pas)",     sampler: euler, scheduler: auto, steps: 12, cfg_scale: 1.0}
    vram_min_gb: 10

  # --------------------------------------------------------------------------
  - id: chroma-radiance
    name: "Chroma1-Radiance"
    family: chroma
    tags: [qualité, non-distillé, non-censuré, t5]
    description: >
      Chroma1-Radiance en GGUF — modèle **pixel-space** (AUCUN VAE : il décode
      directement en pixels) dérivé de Flux, **non distillé** (CFG réel ≈ 4.0,
      ~26 pas) et **non censuré**. Encodeur **T5-XXL fp16** (via --t5xxl, déchargé
      en RAM, ~9,5 Go). Supporte les **prompts négatifs**.
      ⚠️ **Gourmand en VRAM** : pixel-space = pas de compression latente, le buffer
      de diffusion grossit vite avec la résolution. Sur **12 Go, restez ≤ 768 px** ;
      1024 px demande une carte plus large. Prévoir ~16–24 Go de RAM (T5 + modèle).
    sources:
      diffusion:
        repo: silveroxides/Chroma1-Radiance-GGUF
        # v0.3 : ladder de quant complet (Q4_K_S → Q8_0). v0.4 n'existe qu'en Q8_0
        # (trop lourd pour 12 Go), on l'évite donc.
        match: "*Chroma1-Radiance-v0.3*{quant}.gguf"
        quantizable: true
      t5xxl:
        repo: comfyanonymous/flux_text_encoders
        match: "t5xxl_fp16.safetensors"
    defaults:
      steps: 26
      cfg_scale: 4.0
      sampler: euler
      scheduler: auto     # doc sd.cpp : scheduler non forcé (défaut moteur)
      width: 768        # pixel-space gourmand : défaut sûr sur 12 Go
      height: 768
      supports_negative: true
    presets:
      # Aligné sur docs/chroma_radiance.md : euler, cfg 4.0, scheduler = défaut
      # moteur. Non distillé → plus de pas = plus de qualité.
      - {name: "⚡ Recommandé (doc, 20 pas)", sampler: euler, scheduler: auto, steps: 20, cfg_scale: 4.0}
      - {name: "Standard (30 pas)",           sampler: euler, scheduler: auto, steps: 30, cfg_scale: 4.0}
      - {name: "Qualité (40 pas)",            sampler: euler, scheduler: auto, steps: 40, cfg_scale: 4.0}
    vram_min_gb: 10

# ============================================================================
#  PiD — décodeur pixel-diffusion NVIDIA, natif sd.cpp (doc : docs/pid.md).
#  Décode/agrandit ×4 (entraîné 512 -> 2048, 4 pas) via -r + --vae-format flux.
#  ⚠️ Poids officiels sous licence NSCLv1 (non commerciale).
# ============================================================================
pid:
  # Variante Flux.2 : cohérente avec la génération Flux.2 Klein (backbone + VAE
  # Flux.2), ce qui réduit les artefacts par rapport au PiD flux1. Réutilise le
  # VAE Flux.2 DÉJÀ téléchargé pour la génération (aucun re-téléchargement du VAE).
  name: "PiD — décodeur/upscaler pixel-diffusion Flux.2 (NVIDIA)"
  target: 2048          # côté long visé (modèle 512 -> 2048)
  factor: 4             # ratio fixe du modèle (512 -> 2048 = ×4)
  steps: 4
  vae_format: flux2     # backbone Flux.2 -> VAE au format flux2
  sources:
    diffusion:
      repo: Comfy-Org/PixelDiT
      # bf16 (pas mxfp8, réservé Blackwell RTX 50xx).
      match: "pid_flux2_512_to_2048_4step_bf16*.safetensors"
    text_encoder:
      repo: Comfy-Org/PixelDiT
      match: "gemma_2_2b_it*.safetensors"
    vae:
      # Le VAE Flux.2 de la génération (déjà présent si tu génères en Flux.2 Klein).
      repo: Comfy-Org/flux2-klein-9B
      match: "split_files/vae/flux2-vae.safetensors"


# ============================================================================
#  Upscalers ESRGAN GGUF — agrandissement SIMPLE, natif sd.cpp (--mode upscale)
#  Réseaux ESRGAN (2x/4x) : déterministe, 100% GPU, aucun PyTorch ni prompt.
#  Source : huggingface.co/wbruna/upscalers-sdcpp-gguf
# ============================================================================
upscalers:
  name: "Upscalers ESRGAN (GGUF, sd.cpp)"
  repo: wbruna/upscalers-sdcpp-gguf
  files:
    - 2x-ESRGAN.gguf
    - 2xPSNR.gguf
    - 2x_StarSample_V2.0.gguf
    - 4xLSDIRplusC.gguf
    - 4xLSDIRplusN.gguf
    - 4xLSDIRplusR.gguf
    - 4xNomos2_otf_esrgan.gguf
    - 4xNomos8kSC.gguf
    - 4xNomosWebPhoto_esrgan.gguf
    - 4xUltrasharpV10.gguf
    - 4x_NickelbackFS_72000_G.gguf
    - 4x_Nickelback_70000G.gguf
    - 4x_foolhardy_Remacri.gguf
    - 4x_foolhardy_Remacri_ExtraSmoother.gguf
    - RealESRGAN_x4plus.gguf
    - RealESRGAN_x4plus_anime_6B.gguf
    - smbss_2x_RRDB_Animation.gguf
